<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <main class="app">

    <h1 class="title">Weather</h1>

    <div class="search">
      <input id="cityInput" type="text" placeholder="Enter city">
      <button id="searchBtn">Search</button>
    </div>

    <p id="statusMessage" class="status"></p>

    <section id="weatherCard" class="card hidden">

      <div class="left">
        <h2 id="cityName">City</h2>
        <p id="conditionText">Condition</p>
        <div id="weatherIcon" class="icon"></div>

        <div class="temp">
          <span id="temperature">--°F</span>
        </div>
      </div>

      <div class="right">
        <div class="detail">
          <span>Dew Point</span>
          <strong id="dewPoint">--°</strong>
        </div>

        <div class="detail">
          <span>Wind</span>
          <strong id="wind">-- mph</strong>
        </div>

        <div class="detail">
          <span>Humidity</span>
          <strong id="humidity">--%</strong>
        </div>
      </div>

    </section>

  </main>

  <script src="js/script.js"></script>
</body>
</html>
