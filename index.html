<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <main class="app">

    <h1 class="title">Weather</h1>

    <div class="search">
      <input id="cityInput" type="text" placeholder="Enter city">
      <button id="searchBtn">Search</button>
    </div>

    <p id="statusMessage" class="status"></p>

    <section id="weatherCard" class="card hidden">

      <div class="left">
        <h2 id="cityName">City</h2>
        <p id="conditionText">Condition</p>
        <p id="weatherIcon"></p>

        <div class="temp">
          <span id="temperature">--°F</span>
        </div>

        <p id="feelsLike">Feels like --°F</p>
      </div>

      
      <div class="right">

        <div class="stat">
          <div class="row">
            <p>HUMIDITY</p>
            <p id="humidityValue">--%</p>
          </div>
          <div class="row sub">
            <p>DEW POINT</p>
            <p id="dewPoint">--°F</p>
          </div>
        </div>

        <div class="stat">
          <div class="row">
            <p>WIND</p>
            <p id="windValue">-- mph</p>
          </div>
          <div class="row sub">
            <p>DIRECTION</p>
            <p id="windDirection">--°</p>
          </div>
        </div>

      </div>

    </section>

  </main>

  <script src="js/script.js"></script>
</body>
</html>
